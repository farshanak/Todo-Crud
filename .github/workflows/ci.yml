name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-pr-title:
    if: github.event_name == 'pull_request'
    name: validate-pr-title
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR title (conventional commits)
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            chore
            refactor
            test
            deps
            ci
            style
            perf
          requireScope: false

  validate-branch-name:
    if: github.event_name == 'pull_request'
    name: validate-branch-name
    runs-on: ubuntu-latest
    steps:
      - name: Validate branch name
        run: |
          BRANCH="${{ github.head_ref }}"
          PATTERN="^(feat|fix|docs|chore|refactor|test|deps|ci|style|perf)/.+"
          if [[ "$BRANCH" == "main" || "$BRANCH" == "master" || "$BRANCH" == "develop" ]]; then
            echo "Default branch — skipping validation"
            exit 0
          fi
          # Allow Mault kit branches (step<N>/...)
          if [[ "$BRANCH" =~ ^step[0-9]+/.+ ]]; then
            echo "Mault step branch — allowed: $BRANCH"
            exit 0
          fi
          if [[ ! "$BRANCH" =~ $PATTERN ]]; then
            echo "::error::Invalid branch name: $BRANCH"
            echo "Must match: feat|fix|docs|chore|refactor|test|deps|ci|style|perf/<description>"
            exit 1
          fi
          echo "Branch name valid: $BRANCH"

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # --- Backend: ruff ---
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements-dev.txt
      - name: Install backend dev deps
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Ruff (backend)
        working-directory: backend
        run: ruff check .

      # --- Frontend: tsc --noEmit ---
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend deps
        working-directory: frontend
        run: npm install --prefer-offline --no-audit --no-fund
      - name: Type check (frontend)
        working-directory: frontend
        run: npx tsc --noEmit

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # --- Backend: pytest + coverage ---
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements-dev.txt
      - name: Install backend dev deps
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Pytest with coverage (backend)
        working-directory: backend
        run: pytest --cov --cov-fail-under=80

      # --- Frontend: vitest + coverage ---
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend deps
        working-directory: frontend
        run: npm install --prefer-offline --no-audit --no-fund
      - name: Vitest with coverage (frontend)
        working-directory: frontend
        run: npx vitest run --coverage

  integration:
    name: integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # --- Backend integration suite (HTTP API against real FastAPI app) ---
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements-dev.txt
      - name: Install backend dev deps
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Pytest integration (backend)
        working-directory: backend
        run: pytest tests/integration/ -v --cov --cov-report=term

  governance:
    name: governance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Governance gates (ratchets + guardrails)
        run: |
          python scripts/governance/check_silent_catches.py
          python scripts/governance/check_type_holes.py
          python scripts/governance/check_lint_suppressions.py
          python scripts/governance/check_mock_tax.py
          python scripts/governance/guardrails_check.py
          python scripts/governance/check_skipped_tests.py

      - name: Gitleaks secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
        continue-on-error: true
