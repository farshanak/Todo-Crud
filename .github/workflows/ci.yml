name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # --- Backend: ruff ---
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements-dev.txt
      - name: Install backend dev deps
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Ruff (backend)
        working-directory: backend
        run: ruff check .

      # --- Frontend: tsc --noEmit ---
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend deps
        working-directory: frontend
        run: npm install --prefer-offline --no-audit --no-fund
      - name: Type check (frontend)
        working-directory: frontend
        run: npx tsc --noEmit

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # --- Backend: pytest + coverage ---
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements-dev.txt
      - name: Install backend dev deps
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Pytest with coverage (backend)
        working-directory: backend
        run: pytest --cov --cov-fail-under=80

      # --- Frontend: vitest + coverage ---
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend deps
        working-directory: frontend
        run: npm install --prefer-offline --no-audit --no-fund
      - name: Vitest with coverage (frontend)
        working-directory: frontend
        run: npx vitest run --coverage

  integration:
    name: integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # --- Backend integration suite (HTTP API against real FastAPI app) ---
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements-dev.txt
      - name: Install backend dev deps
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Pytest integration (backend)
        working-directory: backend
        # Integration tests validate wiring end-to-end. The `test` job already
        # enforces the 80% coverage floor — this job runs --cov for reporting
        # only, without a fail-under threshold.
        run: pytest tests/integration/ -v --cov --cov-report=term
